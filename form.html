<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description" content="Product Review Form, web page week 5 for Jacob Ethington in the WDD 131 ">
    <meta name="author" content="Jacob Dwayne Ethington">

    <link rel="shortcut icon" href="images/temple.ico" type="image/x-icon">

    <link rel="stylesheet" href="styles/form.css">
    <!-- <link rel="stylesheet" href="styles/filtered-temples-large.css"> -->
    <script src="scripts/form.js" defer></script>

</head>

<body>
    <header>

        <h1>Product Review Form</h1>
    </header>
    <main>
        <form action="review.html" method="get" class="form">
            <fieldset>
                <label>Product Name
                    <select name="product" id="product" required>
                        <option value="" selected disabled>Select a Product...</option>
                        <option>Select a Product..2</option>
                        <option>Select a Product..3</option>
                        <option>Select a Product..4</option>
                    </select>
                </label>

                <div>Overall Rating</div>
                <label>&star;<input type="radio" name="rating" value="one" id="one" required></label>
                <label>&star;&star;<input type="radio" name="rating" value="two" id="two" required></label>
                <label>&star;&star;&star;<input type="radio" name="rating" value="three" id="three" required></label>
                <label>&star;&star;&star;&star;<input type="radio" name="rating" value="four" id="four"
                        required></label>
                <label>&star;&star;&star;&star;&star;<input type="radio" name="rating" value="five" id="five"
                        required></label>

                <label>Date of Installation <input type="date" name="install" value="dateInstall" required></label>

                <div>Which features dvalue you find useful in the product?<br>(Check all that apply)</div>
                <label><input type="checkbox" name="design" value="yes">Design</label>
                <label><input type="checkbox" name="durability" value="yes">Durability</label>
                <label><input type="checkbox" name="easy" value="yes">Ease of Use</label>
                <label><input type="checkbox" name="performance" value="yes">Performance</label>

                <label>Written Review <span>(optional)</span>
                    <textarea name="review" id="review" rows="5"
                        cols="30">Write a review</textarea></label><!-- Check cols -->

                <label>Your Name <span>(optional)</span><input type="text" name="user" value="user"></label>

                <input type="submit" value="Post My Review">
            </fieldset>
        </form>
    </main>


    <footer>
        <p>&copy;<span value="currentYear"></span> 🐄 Jacob Dwayne Ethington 🐄 Arizona</p>
        <p>Last Modified: <span value="lastModified"></span></p>
    </footer>
</body>

</html>
